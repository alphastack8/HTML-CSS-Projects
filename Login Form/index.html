<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form - Alpha Stack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background">
        <div class="login-container">
            <form class="login-form">
                <h2>Login</h2>
                
                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="Type your username">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Type your password">
                    </div>
                    <a href="#" class="forgot-pass">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">LOGIN</button>

                <div class="social-login">
                    <p>Or Sign Up Using</p>
                    <div class="social-icons">
                        <a href="https://www.facebook.com/" class="fb"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="https://x.com/" class="tw"><i class="fa-brands fa-twitter"></i></a>
                        <a href="https://www.google.com/" class="gg"><i class="fa-brands fa-google"></i></a>
                    </div>
                </div>

                <div class="signup-link">
                    <p>Or Sign Up Using</p>
                    <a href="#">SIGN UP</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
